version: '3.8'

services: 
  postgres:
    image: postgres:13
    container_name: in6am_postgres
    environment:
      POSTGRES_USER: IN6AM
      POSTGRES_PASSWORD: admin
      POSTRGRES_DB: kinal_sports
    ports: 
      - "5435:5432"
    volumes:
      - postgres_data:/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  